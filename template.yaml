AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Sample SAM Template for sam-app

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - feature
      - prod
    Description: Environment name (dev, feature, or prod)
  DevRDSSecretArn:
    Type: String
    Default: "rds!db-038b4d1d-cb2e-4fa9-95f9-50e04af2e276"
    Description: ARN of the RDS managed secret for dev/feature environments
  ProdRDSSecretArn:
    Type: String
    Default: "rds!db-prod-12345678-abcd-1234-efgh-123456789012"
    Description: ARN of the RDS managed secret for production environment
  DevHostSecretArn:
    Type: String
    Default: "dev/dbhost"
    Description: ARN of the host secret for dev/feature environments
  ProdHostSecretArn:
    Type: String
    Default: "prod/dbhost"
    Description: ARN of the host secret for production environment
  DevCognitoData:
    Type: String
    Default: "dev/cognito"
  ProdCognitoData:
    Type: String
    Default: "prod/cognito"
  DevCognitoPool:
    Type: String
    Default: "eu-central-1_bR9t8UHwC"
  ProdCognitoPool:
    Type: String
    Default: "eu-central-1_Abc123456"

Conditions:
  IsDevOrFeature: !Or
    - !Equals [!Ref Environment, dev]
    - !Equals [!Ref Environment, feature]
  IsProd: !Equals [!Ref Environment, prod]

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Environment:
      Variables:
        KOREPETYCJE_POSTGRES: ""
        S3_BUCKET_NAME: !Ref ResourcesBucket

Resources:
  # S3 Bucket for storing tutor resources (files, documents, etc.)
  ResourcesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'korepetycje-resources-${Environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
              NewerNoncurrentVersions: 3
          - Id: ArchiveInactiveFiles
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER_IR
                TransitionInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: Korepetycje

  # IAM Role for Lambda functions with SecretsManager and S3 access to environment-specific secrets
  KorepetycjeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE,PATCH'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DevRDSSecretArn}*"
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProdRDSSecretArn}*"
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DevHostSecretArn}*"
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProdHostSecretArn}*"
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DevCognitoData}*"
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProdCognitoData}*"
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminRespondToAuthChallenge
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminAddUserToGroup
                Resource:
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${DevCognitoPool}"
                    - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ProdCognitoPool}"
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ResourcesBucket.Arn
                  - !Sub '${ResourcesBucket.Arn}/*'
