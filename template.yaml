AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Sample SAM Template for sam-app

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - feature
      - prod
    Description: Environment name (dev, feature, or prod)
  DevRDSSecretArn:
    Type: String
    Default: "rds!db-038b4d1d-cb2e-4fa9-95f9-50e04af2e276"
    Description: ARN of the RDS managed secret for dev/feature environments
  ProdRDSSecretArn:
    Type: String
    Default: "rds!db-prod-12345678-abcd-1234-efgh-123456789012"
    Description: ARN of the RDS managed secret for production environment
  DevHostSecretArn:
    Type: String
    Default: "dev/dbhost"
    Description: ARN of the host secret for dev/feature environments
  ProdHostSecretArn:
    Type: String
    Default: "prod/dbhost"
    Description: ARN of the host secret for production environment
  DevCognitoData:
    Type: String
    Default: "dev/cognito"
  ProdCognitoData:
    Type: String
    Default: "prod/cognito"

Conditions:
  IsDevOrFeature: !Or
    - !Equals [!Ref Environment, dev]
    - !Equals [!Ref Environment, feature]
  IsProd: !Equals [!Ref Environment, prod]

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Environment:
      Variables:
        KOREPETYCJE_POSTGRES: ""

Resources:  # IAM Role for Lambda functions with SecretsManager access to environment-specific secrets
  KorepetycjeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE,PATCH'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DevRDSSecretArn}*"
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProdRDSSecretArn}*"
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DevHostSecretArn}*"
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProdHostSecretArn}*"
                  - !If
                    - IsDevOrFeature
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DevCognitoData}*"
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProdCognitoData}*"

  RegisterStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.Authentication.RegisterStudentFunction::RegisterStudent
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/auth/register-student
            Method: post
            RestApiId: !Ref KorepetycjeApi

  LogInFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.Authentication.LogInFunction::LogIn
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/auth/log-in
            Method: post
            RestApiId: !Ref KorepetycjeApi

  ChangePasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.Authentication.ChangePasswordFunction::ChangePassword
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/auth/change-password
            Method: post
            RestApiId: !Ref KorepetycjeApi

  GetLessonsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.GetLessonsFunction::GetLessonsHandler
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/lesson
            Method: get
            RestApiId: !Ref KorepetycjeApi

  PlanLessonsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.PlanLessonsFunction::PlanLessons
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/plan-lessons
            Method: post
            RestApiId: !Ref KorepetycjeApi

  EditLessonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.EditLessonFunction::EditLesson
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/lesson/{lessonId}
            Method: patch
            RestApiId: !Ref KorepetycjeApi

  DeleteLessonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.DeleteLessonFunction::DeleteLesson
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/delete-lesson/
            Method: post
            RestApiId: !Ref KorepetycjeApi

  ConfirmLessonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.ConfirmLessonFunction::ConfirmLesson
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/lesson/{lessonId}/confirm
            Method: put
            RestApiId: !Ref KorepetycjeApi

  GetStudent:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.StudentFunctions.GetStudentFunction::GetStudent
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/student/{studentExternalId}
            Method: get
            RestApiId: !Ref KorepetycjeApi

  UpdateStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.StudentFunctions.UpdateStudentFunction::UpdateStudent
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/student/{studentExternalId}
            Method: patch
            RestApiId: !Ref KorepetycjeApi

  GetStudents:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.StudentFunctions.GetStudentsFunction::GetStudents
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/student
            Method: get
            RestApiId: !Ref KorepetycjeApi

  GetAddress:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.AddressFunctions.GetAddressFunction::GetAddress
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/address/{externalAddressId}
            Method: get
            RestApiId: !Ref KorepetycjeApi

  AddAddress:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.AddressFunctions.AddAddressFunction::AddAddress
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/address
            Method: post
            RestApiId: !Ref KorepetycjeApi

  DeleteAddress:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.AddressFunctions.DeleteAddressFunction::DeleteAddress
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/address/{externalAddressId}
            Method: delete
            RestApiId: !Ref KorepetycjeApi

  UpdateAddress:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/Endpoints/
      Handler: Endpoints::Endpoints.AddressFunctions.UpdateAddressFunction::UpdateAddress
      Runtime: dotnet8
      Architectures:
        - x86_64
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetLessons:
          Type: Api
          Properties:
            Path: /api/address/{externalAddressId}
            Method: patch
            RestApiId: !Ref KorepetycjeApi
